<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Qual Fruta chegou na mesa? <br>
    <input type="text" id="ipt_fruta">

    <button onclick="verificar()">Vai comer?</button>
</body>
</html>

<script>

    function verificar(){
        let fruta = ipt_fruta.value;

        if(fruta == 'uva' || fruta == 'abacaxi'){
            alert(`Sim, vai comer ${fruta}`);
        }else[
            alert(`A fruta ${fruta} ela não come`)
        ]
    }

</script>
