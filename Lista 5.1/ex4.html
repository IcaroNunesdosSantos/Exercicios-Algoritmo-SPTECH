<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Modo de pagamento: 
    <select id="pagamento">
        <option value="dinheiro">Dinheiro</option>
        <option value="debito">Cartão de débito</option>
        <option value="credito">Cartão de crédito</option>
        <option value="boleto">Boleto</option>
    </select>
    <br><br>

    <button onclick="analisar()">Analisar Compra</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    
    function analisar(){
        let pag = pagamento.value;
    
        if(pag == 'credito' || pag == 'boleto'){
            console.log('credito ou boleto');
            div_mensagem.innerHTML = `Pagamento poderá ser parcelado`;
        }else if(pag == 'debito' || pag == 'dinheiro'){
            console.log('dinheiro ou debito');
            div_mensagem.innerHTML = `Você terá que pagar a vista`;
        }

    }
</script>
