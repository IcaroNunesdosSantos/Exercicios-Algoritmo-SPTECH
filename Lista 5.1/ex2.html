<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe sua nota do enem: <input type="text" id="ipt_enem"><br><br>
    Informe sua nota do vestibular interno: <input type="text" id="ipt_vestibular">

    <button onclick="avaliacao()">Avaliação</button>
</body>
</html>

<script>

    function avaliacao(){
        let enem = Number(ipt_enem.value);
        let vestibular = Number(ipt_vestibular.value);

        if(enem >= 800 || vestibular >= 700){
            alert(`Parabéns! Aprovado`);
        }else {
            alert(`Tente semestre que vem!`);
        }
    }

</script>
