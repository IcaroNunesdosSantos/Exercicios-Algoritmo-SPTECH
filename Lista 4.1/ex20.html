<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Qual sua meta de economia? <input type="text" id="ipt_meta"> <br><br>

    Quanto você tem guardado? <input type="text" id="ipt_guardado"><br><br>

    <button onclick="analisar()">Analisar economia</button><br><br>

    <div id="div_exibir"></div>
</body>
</html>

<script>
    function analisar(){
        let meta = Number(ipt_meta.value);
        let guardado = Number(ipt_guardado.value);
        let diferenca = guardado - meta;
        let falta = meta - guardado

        if(meta == guardado){
            div_exibir.innerHTML = `Parabéns, meta alcançada!`;
        }
        if(guardado > meta){
            div_exibir.innerHTML = `Parabéns, meta alcançada! <br> Meta ultrapassada em ${diferenca}`
        }
        if(guardado < meta){
            div_exibir.innerHTML = `Força! Ainda em busca da meta! Falta ${falta}`
        }


    }
</script>
