<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe sua frequência(0-100): <input type="text" id="ipt_freq"><br><br>
    <button onclick="analisarFreq()">Analisar Frequência</button>

    <div id="div_exibir"></div>
</body>
</html>

<script>
    function analisarFreq(){
        let frequencia = Number(ipt_freq.value);

        if(frequencia >= 50){
            div_exibir.innerHTML = `<img style="width: 400px" src="https://img.freepik.com/fotos-gratis/cachorro-fofo-com-oculos-sentado-sobre-livros_23-2148917261.jpg?semt=ais_hybrid&w=740&q=80">`
        }else{
            div_exibir.innerHTML = `<img style="width: 400px" src="https://img.cdndsgni.com/preview/12256286.jpg">`
        }
    }
</script>
