<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe um valor minimo:
    <input type="text" id="ipt_min">
    <br><br>
    Informe um valor maximo:
    <input type="text" id="ipt_max">
    <br><br>
    <button onclick="verificar()">Curto 3 e 5!</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>

    function verificar(){
        let min = Number(ipt_min.value);
        let max = Number(ipt_max.value);
        let mensagem = '';
        let contador = min;

        while(contador < max){
            contador++
            if(contador % 3 != 0 && contador % 5 != 0){
                mensagem += `${contador}<br>`
            }
            if(contador % 3 == 0 && contador % 5 == 0){
                mensagem += `É TRI!É PENTA! <br>`
            }else if(contador % 3 == 0){
                mensagem += `É TRI! <br>`;
            }else if(contador % 5 == 0){
                mensagem += `É PENTA! <br>`;
            }
        }
        div_mensagem.innerHTML = mensagem;
    }

</script>
