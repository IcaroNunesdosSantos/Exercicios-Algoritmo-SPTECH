<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe de quantos em quantos dias você faz musculação?
    <input type="text" id="ipt_diasMusc"> <br>

    <button onclick="rotina()">Exibir rotina mensal</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>

    function rotina(){
        let diasMusc = ipt_diasMusc.value;
        let mensagem = ''
        let contador = 1;

        while(contador <= 30){
            mensagem += `<br>Dia ${contador} - `

            if(contador % diasMusc == 1){
                mensagem += `Musculação`
            }else{
                mensagem += `Comer, dormir etc`
            }
            contador++
        }

        div_mensagem.innerHTML = mensagem
    }

</script>
