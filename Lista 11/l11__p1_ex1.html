<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe um número: 
    <input oninput="verificar()" type="text" id="ipt_numero">
    
    <div id="div_mensagem"></div>
</body>
</html>

<script>

    function positivo(numero){
        let ehPositivo = false;
        
        if(numero > -1){
            ehPositivo = true;
        }
        
        return `O número ${numero} é positivo: ${ehPositivo}`
    }
    
    function verificar(){
        let numero = Number(ipt_numero.value);
        
        div_mensagem.innerHTML = positivo(numero);
    }

</script>
