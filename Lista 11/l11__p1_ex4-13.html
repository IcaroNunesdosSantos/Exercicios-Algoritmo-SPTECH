<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="exibir()">Exibir</button>
    <div id="div_exibirLista"></div> 
    
    <div id="div_mensagem"></div>
    
</body>
</html>

<script>
    let numberList = [1,50,17,56];
    
    function exibir(){

        div_exibirLista.innerHTML = numberList;
        
        let mensagem = '';
        
        let soma = somar(numberList);
        let maior = maiorValor(numberList);
        let menor = menorValor(numberList);
        let media = gerarMedia(numberList);
        let pares = listarPares(numberList);
        let impares = listarImpares(numberList);
        let totalPares = qtdPares(numberList);
        let totalImpares = qtdImpares(numberList);
        let repeticoes = contarValor(numberList, 50)
        let saoTodosPositivos = todosPositivos(numberList);

        mensagem = `Soma: ${soma} <br>
                    Maior valor: ${maior} <br>
                    Menor valor: ${menor} <br>
                    Pares: ${pares} <br>
                    Impares: ${impares} <br>
                    Quantidade de elementos pares: ${totalPares} <br>
                    Quantidade de elementos Impares: ${totalImpares} <br>
                    Quantidade de vezes que o 50 aparece: ${repeticoes} <br>
                    Todos os elementos são positivos? ${saoTodosPositivos}`

        div_mensagem.innerHTML = mensagem;
    }

    /* 4 */
    function somar(vetor){
        let soma = 0;

        for (let i = 0; i < vetor.length; i++) {
            soma += vetor[i];
        }

        return soma;
    }

    /* 5 */
    function maiorValor(vetor){
        let maiorValor = vetor[0];

        for(i = 0; i < vetor.length; i++){
            if(vetor[i] > maiorValor ){
                maiorValor = vetor[i]
            }
        }

        return maiorValor;
    }

    /* 6 */
    function menorValor(vetor){
        let menorValor = vetor[0];

        for(i = 0; i < vetor.length; i++){
            if(vetor[i] < menorValor){
                menorValor = vetor[i]
            }
        }

        return menorValor;
    }

    /* 7 */
    function gerarMedia(vetor){
        let soma = somar(vetor);

        let media = soma / vetor.length;

        return media;
    }

    /* 8 */
    function listarPares(vetor){
        let listaPares = [];

        for(i = 0; i < vetor.length; i++){
            if(vetor[i] % 2 == 0){
                listaPares.push(vetor[i]);
            }
        }

        return listaPares;
    }

    /* 9 */
    function listarImpares(vetor){
        let listaImpares = [];

        for(i = 0; i < vetor.length; i++){
            if(vetor[i] % 2 != 0){
                listaImpares.push(vetor[i]);
            }
        }

        return listaImpares;
    }

    /* 10 */
    function qtdPares(vetor){
        let totalPares = 0;
        for(i = 0; i < vetor.length; i++){
            if(vetor[i] % 2 == 0){
                totalPares++
            }
        }

        return totalPares;
    }

    /* 11 */
    function qtdImpares(vetor){
        let totalImpares = 0;
        for(i = 0; i < vetor.length; i++){
            if(vetor[i] % 2 == 0){
                totalImpares++
            }
        }

        return totalImpares;
    }

    /* 12 */
    function contarValor(vetor,valor){
        let qtdRepete = 0;
        
        for(i = 0; i < vetor.length; i++){
            if(vetor[i] == valor){
                qtdRepete++
            }
        }


        return qtdRepete;
    }

    /* 13 */
    function todosPositivos(vetor){
        let todosPositivos = false;

        for(i = 0; i < vetor.length; i++){
            if(vetor[i] >= 0){
                todosPositivos = true;
            }else if(vetor[i] < 0){
                todosPositivos = false;
                break;
            }
        }

        return todosPositivos;
    }

</script>
