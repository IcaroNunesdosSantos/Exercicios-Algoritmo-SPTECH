<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    Informe sua nota: <input type="text" id="ipt_nota">

    <button onclick="avaliar()">Avaliar aluno</button>

</body>
</html>

<script>

    function avaliar(){
        let nota = Number(ipt_nota);

        if(nota >= 0 && nota <= 10){
            alert("Nota válida!!")
        }else {
            alert("Onde já se viu nota menor que 0 e maior que 10?!")
        }
    }

</script>
