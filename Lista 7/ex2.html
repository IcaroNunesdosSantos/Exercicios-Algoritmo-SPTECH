<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Diga()">Diga algo sobre a matéria de Algoritmos</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let contador = 0
    let mensagem = ''

    function Diga(){
        while(contador < 7){
            contador++
            mensagem += `Melhor matéria <br>`
        }
        div_mensagem.innerHTML = mensagem;
    }

</script>
