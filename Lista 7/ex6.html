<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Filtrar()">Filtrar números Cabalísticos</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let contador = 0
    let mensagem = ''

    function Filtrar(){
        while(contador < 30){
            contador++
            if(contador != 3 && contador != 4 && contador != 7 && contador != 10 && contador != 12 ){
                mensagem += contador+ `<br>`
            }
        }
        div_mensagem.innerHTML = mensagem;
    }


</script>
