<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe um número (Entre 20 e 100): <input type="text" id="ipt_number">
    <button onclick="multiplos()">Adoro múltiplos de 5</button>
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    
    function multiplos(){
        let contador = 0
        let mensagem = ''
        let number = Number(ipt_number.value);
        
        if(number >= 20 && number <= 100){
            while(contador <= number){
                mensagem += `<br> ${contador}`
                contador += 5
            }
        }else{
            mensagem = `Número inválido`
        }

        div_mensagem.innerHTML = mensagem;
    }
</script>
