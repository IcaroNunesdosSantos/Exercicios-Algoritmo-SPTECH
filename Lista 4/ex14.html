<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira sua primeira nota: <input type="text" id="ipt_nota1"><br><br>
    Insira sua segunda nota: <input type="text" id="ipt_nota2"><br><br>

    <button onclick="calcularMedia()">Verificar Situação</button>
</body>
</html>

<script>
    function calcularMedia(){ 
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let media = (nota1 + nota2) / 2;
        if(media >= 6){
            alert(`Parabéns, aprovado!`)
        }else {
            alert(`Tente outra vez...`);
        }
    }
</script>
