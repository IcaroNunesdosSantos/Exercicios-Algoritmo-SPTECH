<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira a nota 1: <input type="text" id="ipt_nota1">
    Insira a nota 2: <input type="text" id="ipt_nota2">
    Insira a nota 3: <input type="text" id="ipt_nota3">

    <button onclick="desempenho()">Analisar Desempenho</button>

    <div id="div_exibir"></div>
</body>
</html>

<script>

    function desempenho(){
        let nota1 = Number(ipt_nota1.value);
        let nota2 = Number(ipt_nota2.value);
        let nota3 = Number(ipt_nota3.value);

        let media = (nota1 + nota2 + nota3) / 3;

        div_exibir.innerHTML = `Sua média foi de ${media}`;
        
        if(media > 9.4){
            div_exibir.innerHTML = div_exibir.innerHTML + `<br> Parabéns, você é fora de série!`;
        }
    }

</script>
