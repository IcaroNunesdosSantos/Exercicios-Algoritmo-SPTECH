<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe o saldo da sua conta: <input type="text" id="ipt_saldo"><br><br>
    Informe o valor do débito (valor a tirar da conta): <input type="text" id="ipt_debito"><br><br>

    <button onclick="novoSaldo()">Analisar Conta</button>

    <div id="div_exibir"></div>
</body>
</html>

<script>
    function novoSaldo(){
        let saldo = Number(ipt_saldo.value);
        let debito = Number(ipt_debito.value);

        let novoSaldo = saldo - debito;

        if(novoSaldo >= 0){
            div_exibir.innerHTML = `<br>O saldo atual da conta corrente é R$${novoSaldo}`
        }else {
            div_exibir.innerHTML = `<br> <b style="color: red">O saldo atual da conta corrente é R$${novoSaldo} </b>`
        }

    }
</script>
