<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe o saldo na sua conta atualmente: <input type="text" id="ipt_saldo"><br><br>
    <button onclick="verificarSaldo()">Verificar Finanças</button><br><br>
    <div id="div_exibir"></div>
</body>
</html>

<script>
    function verificarSaldo(){
        let saldo = Number(ipt_saldo.value);
        
        if(saldo == 0){
            div_exibir.innerHTML = `Conta zerada!`;
        }
        if(saldo > 0){
            div_exibir.innerHTML = `<span style="color: blue;">Saldo positivo! sorriso</span>`
        }
        if(saldo < 0){
            div_exibir.innerHTML = `<span style="color: red;">Está devendo!</span>`
        }

    }
</script>
