<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Informe o saldo na sua conta atualmente: <input type="text" id="ipt_saldo"><br><br>
    Informe o valor do débito (valor a tirar da conta): <input type="text" id="ipt_debito"><br><br>

    <button onclick="analisarConta()">Analisar Conta</button>

    <div id="div_exibir"></div>
</body>
</html>

<script>

    function analisarConta(){
        let saldo = Number(ipt_saldo.value);
        let debito = Number(ipt_debito.value);

        let novoSaldo = saldo - debito;

        if(novoSaldo >= 0){
            div_exibir.innerHTML = `<i style="color: blue;">o saldo atual da conta corrente é ${novoSaldo}</i>`;
        }else{
            div_exibir.innerHTML = `<b style="color: red;">o saldo atual da conta corrente é ${novoSaldo}</b>`
        }
    }

</script>
