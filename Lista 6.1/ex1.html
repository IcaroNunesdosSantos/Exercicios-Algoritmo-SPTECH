<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Pesquise uma fruta
    <input type="text" id="ipt_fruta" />
    <button onclick="pesquisar()">Pesquisar</button>
    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  let frutas = ["Uva", "Maçã", "Banana"];

  function pesquisar() {
    let fruta = ipt_fruta.value;

    if (frutas.includes(fruta)) {
      div_mensagem.innerHTML = `A fruta ${fruta} Existe na lista`;
    } else {
      div_mensagem.innerHTML = `    Não existe a fruta ${fruta} na lista.`;
    }
  }
</script>
