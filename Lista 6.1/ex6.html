<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Insira o rank dos seus filmes favoritos:
    <input type="text" id="ipt_filme" />
    <button onclick="cadastro()">Cadastrar filme</button>
    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  let filmes = [];
  function cadastro() {
    let mensagem = "";
    let filme = ipt_filme.value;
    filmes.push(filme);

    mensagem += "<br>" + filmes.toString().replaceAll(",", "<br>");

    div_mensagem.innerHTML = mensagem;
  }
</script>
