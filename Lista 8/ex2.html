<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Quantas pessoas vão entrar no carro?<br />
    <input type="text" id="ipt_qtdPessoas" /> <br />
    Quantos passageiros o veículo suporta? <br />
    <input type="text" id="ipt_capacidade" /> <br />
    <button onclick="carona()">#Partiu Carona</button>

    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  function carona() {
    let qtdPessoas = Number(ipt_qtdPessoas.value);
    let capacidade = Number(ipt_capacidade.value);
    let mensagem = "";

    for (let contador = 0; contador <= qtdPessoas; contador++) {
      if (contador > capacidade) {
        mensagem += `<br>O ${contador}º passageiro terá que esperar!`;
      } else if (contador > 1) {
        mensagem += `<br>Entrou o ${contador}º passageiro`;
      } else if (contador == 1) {
        mensagem += `<br>Entrou o ${contador}º passageiro (que é o(a) motorista)`;
      }
    }

    div_mensagem.innerHTML = mensagem;
  }
</script>
