<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Insira seu nome:
    <input type="text" id="ipt_nome" />
    Insira seu número da sorte (1-10):
    <input type="text" id="ipt_numero" />

    <button onclick="sortear()">Sortear</button>

    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  let sorteios = 0;
  function sortear() {
    let nome = ipt_nome.value;
    let numero = Number(ipt_numero.value);

    let aleatorio = Math.random();
    let sorteado = (aleatorio * 9 + 1).toFixed();

    if (numero > 0 && numero <= 10) {
      if (numero == sorteado) {
        sorteios++;
        div_mensagem.innerHTML = `Parabéns, ${nome} você foi sorteado(a) após ${sorteios} sorteios!`;
      } else {
        sorteios++;
      }
    } else {
        alert("Insira um número entre 1 e 10")
    }
  }
</script>
