<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira seu nome:
    <input type="text" id="ipt_nome">
    Insira seu número da sorte (1-100):
    <input type="text" id="ipt_numero">
    Insira seu segundo número da sorte (1-100):
    <input type="text" id="ipt_numero2">
    Insira seu terceiro número da sorte (1-100):
    <input type="text" id="ipt_numero3">


    <button onclick="sortear()">Sortear</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let sorteios = 0;
    function sortear() {
        let nome = ipt_nome.value;
        let numero = Number(ipt_numero.value);
        let numero2 = Number(ipt_numero2.value);
        let numero3 = Number(ipt_numero3.value);

        let aleatorio = Math.random();
        let sorteado = (aleatorio * 99 + (1)).toFixed();

        if( (numero > 0 && numero <= 100) &&
            (numero2 > 0 && numero2 <= 100) &&
            (numero3 > 0 && numero3 <= 100)
        ){
            if(numero == sorteado){
                sorteios++;
                div_mensagem.innerHTML = `Parabéns, ${nome} o seu número da sorte ${numero} foi sorteado após ${sorteios} sorteios!`
            }else if(numero2 == sorteado){
                sorteios++;
                div_mensagem.innerHTML = `Parabéns, ${nome} o seu número da sorte ${numero2} foi sorteado após ${sorteios} sorteios!`
            }else if(numero3 == sorteado){
                sorteios++;
                div_mensagem.innerHTML = `Parabéns, ${nome} o seu número da sorte ${numero3} foi sorteado após ${sorteios} sorteios!`
            }else{
                sorteios++;
            }

        }else{
            alert("Insira valores entre 1 e 100.")
        }

    }

</script>
