<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="cabalisticos()">Quero um número cabalístico!</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>

    function cabalisticos(){
        let aleatorio = Math.random();

        let numero = (aleatorio * 14 + 1).toFixed();
        let mensagem = '';

        if(numero == 3 ||
           numero == 4 ||
           numero == 7 ||
           numero == 10 ||
           numero == 12
        ){
            mensagem = `Eu S2 números cabalísticos!`
        }else{
            mensagem = `Ah, me dá um número bom na próxima!`
        }

        div_mensagem.innerHTML = `${numero} <br> ${mensagem}`;
    }


</script>
