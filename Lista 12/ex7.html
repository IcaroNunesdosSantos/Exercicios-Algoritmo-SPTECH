<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Nome do jogo:
    <input type="text" id="ipt_nome"> <br><br>

    Empresa:
    <input type="text" id="ipt_empresa"> <br><br>

    Plataforma:
    <input type="text" id="ipt_plataforma"> <br><br>

    <button onclick="cadastrar()">Cadastrar Jogo</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let jogo;
    function cadastrar(){
        jogo = 
        {
            nome: ipt_nome.value,
            empresa: ipt_empresa.value,
            plataforma: ipt_plataforma.value
        }

        jogo.nome = jogo.nome.toUpperCase();
        jogo.empresa = jogo.empresa.toLowerCase();

        div_mensagem.innerHTML = `
            Jogo: ${jogo.nome} <br>
            Empresa: ${jogo.empresa} <br>
            Plataforma: ${jogo.plataforma} <br>
        `
    }

</script>
