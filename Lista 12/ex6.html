<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Marca do Carro:
    <input type="text" id="ipt_marca"> <br><br>

    Modelo:
    <input type="text" id="ipt_modelo"> <br><br>

    Ano:
    <input type="text" id="ipt_ano"> <br><br>

    <button onclick="cadastrar()">Cadastrar Carro</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let carro;
    function cadastrar(){
        carro = 
        {
            marca: ipt_marca.value,
            modelo: ipt_modelo.value,
            ano: ipt_ano.value
        }

        carro.idade = 2026 - carro.ano;
        delete carro.ano;

        div_mensagem.innerHTML = `
            Marca: ${carro.marca} <br>
            Modelo: ${carro.modelo} <br>
            Idade do carro: ${carro.idade} <br>
        `
    }

</script>
