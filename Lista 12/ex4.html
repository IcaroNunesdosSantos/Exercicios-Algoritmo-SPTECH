<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="ipt_nome">Nome do filme:</label>
    <input type="text" id="ipt_nome"> <br><br>

    <label for="ipt_genero">Gênero:</label>
    <input type="text" id="ipt_genero"><br><br>

    <label for="ipt_nota"> Nota: </label>
    <input type="text" id="ipt_nota"> <br><br>

    <button onclick="cadastrar()">Cadastrar Filme</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let filme;

    function cadastrar(){
        filme = 
        {
            nome: ipt_nome.value,
            genero: ipt_genero.value,
            nota: ipt_nota.value
        }

        if(filme.nota >= 8){
            filme.classificacao = 'Filme Excelente';
        }else{
            filme.classificacao = 'Filme Regular';
        }

        div_mensagem.innerHTML = `
            Filme: ${filme.nome} <br>
            Gênero: ${filme.genero} <br>
            Nota: ${filme.nota} <br>
            Classificação: ${filme.classificacao} <br>
        `
    }


</script>
