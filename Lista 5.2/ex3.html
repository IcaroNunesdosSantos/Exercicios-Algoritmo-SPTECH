<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Tipo de Passageiro:
    <select id="tipoPassageiro">
        <option value="comum">Comum</option>
        <option value="estudante">Estudante</option>
        <option value="idoso">Idoso/PNE</option>
    </select>
    
    Tipo de Passagem:
    <select id="tipoPassagem">
        <option value="unica">Passagem única</option>
        <option value="integracao">Passagem integração</option>
    </select>

    <button onclick="simular()">Simular preço</button>

    <div id="div_mensagem"></div>
</body>
</html>

<script>
    
    function simular(){

        let Passageiro = tipoPassageiro.value;
        let Passagem = tipoPassagem.value;
        let valorPassagem = 0;

        if(Passagem == 'unica'){
            valorPassagem = 4.40;                
        }else {
            valorPassagem = 5.90;
        }

        if(Passageiro == 'estudante' && (Passagem == 'unica' || Passagem == 'integracao')){
            valorPassagem = valorPassagem * 50 / 100;
        }

        if(Passageiro == 'idoso'){
            valorPassagem = 0;
        }

        div_mensagem.innerHTML = `Valor da passagem escolhida: ${valorPassagem.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`;

    }

</script>
