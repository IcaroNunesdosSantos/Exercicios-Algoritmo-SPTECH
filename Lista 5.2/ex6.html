<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Informe sua nota: <input type="text" id="ipt_nota" /> <br /><br />
    Informe sua frequência (%): <input type="text" id="ipt_freq" /> <br /><br />

    <button onclick="analisar()">Analisar aluno</button>

    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  function analisar() {
    let nota = Number(ipt_nota.value);
    let freq = Number(ipt_freq.value);

    if (nota >= 0 && nota < 6) {
      div_mensagem.innerHTML = `Aluno ficou abaixo da média`;
    } else if (nota >= 6 && nota <= 8) {
      div_mensagem.innerHTML = `Aluno ficou na média`;
    } else {
      div_mensagem.innerHTML = `Aluno acima da média`;
    }

    if (freq >= 75) {
      div_mensagem.innerHTML += `<br> Aluno aprovado por frequência`;
    } else {
      div_mensagem.innerHTML += `<br> Aluno reprovado por frequência`;
    }

    if (freq < 0 || freq > 100) {
      alert(`Onde já e viu frequência <0 ou >100?!`);
      div_mensagem.innerHTML = ` `;
    }

    if (nota < 0 || nota > 10) {
      alert(`Onde já se viu nota <0 ou >10 ?!`);
      div_mensagem.innerHTML = ` `;
    }
    
  }
</script>
