<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Insira uma frase: <input type="text" id="ipt_frase" /> <br /><br />
    Informe o numero de qual letra deseja ver:
    <input type="text" id="ipt_numLetra" oninput="indice()" /> <br /><br />

    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  function indice() {
    let frase = ipt_frase.value;
    let numLet = ipt_numLetra.value;

    let tamFrase = frase.length;

    let primeira = frase[0];
    let desejada = frase[numLet - 1];
    let ultima = frase[tamFrase - 1];

    div_mensagem.innerHTML = `A primeira letra é: ${primeira}
                    <br>A ${numLet}ª letra é: ${desejada}
                    <br>A última letra é: ${ultima}`;
  }
</script>
