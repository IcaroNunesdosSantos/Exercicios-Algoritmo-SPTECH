<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Informe a frase:
    <input type="text" id="ipt_frase" />

    <button onclick="analisar()">Analisar Frase</button>

    <div id="div_mensagem"></div>
  </body>
</html>

<script>
  function analisar() {
    let mensagem = "";
    let frase = ipt_frase.value;

    let fraseVerificada =
      frase.includes("teste") ||
      frase.includes("abc") ||
      frase.includes("spam");

    if (fraseVerificada) {
      mensagem = `<span style="color: red;">Frase Inválida</span>`;
    } else {
      mensagem = `<span style="color: green;">Frase Válida!</span>`;
    }

    div_mensagem.innerHTML = mensagem;
  }
</script>
