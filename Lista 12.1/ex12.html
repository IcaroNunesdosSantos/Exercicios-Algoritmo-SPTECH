<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Filmes que já viu!!</h1>

    Insira o nome do filme:
    <input type="text" id="ipt_nome"> <br><br>

    Insira o gênero do filme:
    <input type="text" id="ipt_genero"> <br><br>

    <button onclick="cadastrar()">Cadastrar</button> <br><br>
    <button onclick="listar()">Listar Filmes</button> <br><br>

    de... <input type="text" id="ipt_de">
    ate... <input type="text" id="ipt_ate"> <br><br>
    <button onclick="filtrarDeAte()">Filtrar Filmes por Registro</button> <br><br>

    <input type="text" id="ipt_filtroGenero" placeholder="Filtrar por gênero">
    <button onclick="filtrarGenero()">Filtrar Filmes por Gênero</button>
    <hr>

    <div id="div_mensagem"></div>


</body>
</html>

<script>

    let filmes = [];
    let filme;

    function cadastrar(){
        filme = {
            nome: ipt_nome.value,
            genero: ipt_genero.value
        }

        filmes.push(filme);

        div_mensagem.innerHTML = `Você já assistiu ${filmes.length} filmes`
    }

    function listar(){
        let mensagem = '';

        for (let i = filmes.length - 1; i >= 0; i--) {
            let filmeAtual = filmes[i];

            mensagem += `<br> ${i+1}. Filme: ${filmeAtual.nome} Gênero: ${filmeAtual.genero}`;
        }

        div_mensagem.innerHTML = mensagem;
    }

    function filtrarDeAte(){
        let mensagem = '';
        let de = ipt_de.value;
        let ate = ipt_ate.value;

        if(ate > de){
            for(let i = filmes.length-1; i >= 0; i--){
                if(i <= ate-1 && i >= de-1){
                    mensagem += `<br>
                        ${i+1}. Filme: ${filmes[i].nome}
                        Gênero: ${filmes[i].genero}
                    `       
                }
            }
        }else{
            mensagem = `O valor de "de..." deve ser menor que o valor de "até..."`
        }

        div_mensagem.innerHTML = mensagem;

    }

    function filtrarGenero(){
        let mensagem = '';
        let genero = ipt_filtroGenero.value;
        for (let i = 0; i < filmes.length; i++) {
            let filmeAtual = filmes[i];
            
            if(genero == filmeAtual.genero){
                mensagem += `<br> ${i+1}. Filme: ${filmeAtual.nome} Gênero: ${filmeAtual.genero}`;
            }
        }

        div_mensagem.innerHTML = mensagem;
    }
</script>
